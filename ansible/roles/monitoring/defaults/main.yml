# Service versions
loki_version: "3.0.0"
promtail_version: "3.0.0"
grafana_version: "12.3.1"

# Ports
loki_port: 3100
promtail_port: 9080
grafana_port: 3000

# Retention
loki_retention_period: "168h"

# Grafana credentials
grafana_admin_user: "admin"
grafana_admin_password: "admin123"

# Deployment directory
monitoring_dir: "/opt/monitoring"

# Schema
loki_schema_version: "v13"
loki_schema_from: "2024-01-01"

# Resource limits
loki_memory_limit: "1g"
loki_cpu_limit: "1.0"
promtail_memory_limit: "256m"
promtail_cpu_limit: "0.5"
grafana_memory_limit: "512m"
grafana_cpu_limit: "1.0"

# Prometheus
prometheus_version: "v3.9.0"
prometheus_port: 9090
prometheus_retention_days: "15d"
prometheus_retention_size: "10GB"
prometheus_scrape_interval: "15s"
prometheus_memory_limit: "1g"
prometheus_cpu_limit: "1.0"

prometheus_scrape_targets:
  - job: "prometheus"
    targets: ["localhost:9090"]
    path: "/metrics"
  - job: "loki"
    targets: ["loki:3100"]
    path: "/metrics"
  - job: "grafana"
    targets: ["grafana:3000"]
    path: "/metrics"
  - job: "app"
    targets: ["app-python:8000"]
    path: "/metrics"