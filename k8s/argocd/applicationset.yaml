apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: devops-python-set
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - env: dev
            namespace: dev
            valueFile: values-dev.yaml
            autoSync: "true"
          - env: prod
            namespace: prod
            valueFile: values-prod.yaml
            autoSync: "false"
  template:
    metadata:
      name: devops-python-{{.env}}
    spec:
      project: default
      source:
        repoURL: https://github.com/3llimi/DevOps-Core-Course.git
        targetRevision: lab13
        path: k8s/devops-python
        helm:
          valueFiles:
            - "{{.valueFile}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.namespace}}"
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
  templatePatch: |
    {{- if eq .autoSync "true" }}
    spec:
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
    {{- end }}
