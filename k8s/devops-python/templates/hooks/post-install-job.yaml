apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ include "devops-python.fullname" . }}-post-install"
  labels:
    {{- include "devops-python.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  template:
    metadata:
      name: "{{ include "devops-python.fullname" . }}-post-install"
    spec:
      restartPolicy: Never
      containers:
      - name: post-install-job
        image: busybox
        command: ['sh', '-c', 'echo Post-install smoke test started && echo Verifying deployment... && sleep 5 && echo Smoke test passed successfully']