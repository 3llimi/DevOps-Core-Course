apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ include "devops-python.fullname" . }}-pre-install"
  labels:
    {{- include "devops-python.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  template:
    metadata:
      name: "{{ include "devops-python.fullname" . }}-pre-install"
    spec:
      restartPolicy: Never
      containers:
      - name: pre-install-job
        image: busybox
        command: ['sh', '-c', 'echo Pre-install validation started && echo Checking environment... && sleep 5 && echo Pre-install validation completed successfully']