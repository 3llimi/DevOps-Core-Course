{{- if not .Values.statefulset.enabled }}
{{- if eq .Values.rollout.strategy "blueGreen" }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "devops-python.fullname" . }}-preview
  labels:
    {{- include "devops-python.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "devops-python.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
{{- end }}
{{- end }}
